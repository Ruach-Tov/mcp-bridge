  <path d="M 360.0,860.0 Q 440.0,905.0 360.0,955.0" fill="none" stroke="#8b949e" stroke-width="1.5"        marker-end="url(#arrowhead)" data-bpd-line="109"        data-element-type="transition"        data-from="check_restart_allowed"        data-to="restarting" />
  <text x="450.0" y="905.0" fill="#8b949e"        font-size="9" font-style="italic">→ restarting</text>
  <path d="M 381.7241379310345,850.6896551724138 L 640.2413793103449,1112.7586206896551" fill="none" stroke="#8b949e" stroke-width="1.5"        marker-end="url(#arrowhead)" data-bpd-line="109"        data-element-type="transition"        data-from="check_restart_allowed"        data-to="discontinuation" />
