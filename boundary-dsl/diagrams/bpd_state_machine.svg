  <text x="517.5" y="820.0" fill="#8b949e"        font-size="9" font-style="italic">(signal(TERM)  or  (boundary_s...</text>
  <path d="M 360.0,555.0 Q 440.0,605.0 360.0,655.0" fill="none" stroke="#8b949e" stroke-width="1.5"        marker-end="url(#arrowhead)" data-bpd-line="101"        data-element-type="transition"        data-from="running"        data-to="error" />
  <text x="450.0" y="605.0" fill="#8b949e"        font-size="9" font-style="italic">not exists(process_handle</text>
