  </g>
  <g data-element-type="state" data-state-name="discontinuation"     data-state-type="final" data-bpd-line="118" data-prov-source="commit:ca73fd8c2" data-prov-reasoning="Discontinuation tears down listener and signals server">
    <ellipse cx="675.0" cy="1130" rx="60" ry="25"             fill="#1a2332" stroke="#f85149" stroke-width="3" />
    <ellipse cx="675.0" cy="1130" rx="56" ry="21"             fill="none" stroke="#f85149" stroke-width="1" />
    <text x="675.0" y="1134" text-anchor="middle"          fill="#f0f6fc" font-size="11">discontinuation</text>
    <text x="745.0" y="1125"          fill="#7ee787" font-size="9">on: enter</text>
