    <text x="360.0" y="384" text-anchor="middle"          fill="#f0f6fc" font-size="11">starting(atlaunch)</text>
  </g>
  <g data-element-type="state" data-state-name="running"     data-state-type="normal" data-bpd-line="97" data-prov-source="mcp_2024_11_05, posix, commit:173411b8c" data-prov-reasoning="Running state: bridge relays JSON-RPC between transports">
