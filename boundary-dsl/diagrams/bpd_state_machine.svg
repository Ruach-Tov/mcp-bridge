    <text x="360.0" y="834" text-anchor="middle"          fill="#f0f6fc" font-size="11">check_restart_allowed(how_retry)</text>
  </g>
  <g data-element-type="state" data-state-name="restarting"     data-state-type="normal" data-bpd-line="111" data-prov-source="commit:ca73fd8c2" data-prov-reasoning="Restarting increments counter and re-enters :starting">
